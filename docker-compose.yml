services:
  ip-manager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ip-manager
    hostname: ip-manager
    restart: unless-stopped
    ports:
      - "5001:5001"
    command: python app.py
    environment:
      - TZ=Asia/Seoul
    networks:
      - npm-network

networks:
  npm-network:
    driver: bridge
