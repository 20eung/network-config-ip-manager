<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Nokia blue rounded background -->
  <rect width="32" height="32" rx="7" fill="#0047AB"/>

  <!-- Connection lines (white, hub → nodes) -->
  <line x1="16" y1="16" x2="16" y2="7"  stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="16" y2="25" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="7"  y2="16" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="25" y2="16" stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- Center hub node (white) -->
  <circle cx="16" cy="16" r="3.5" fill="white"/>

  <!-- Endpoint nodes (light blue) -->
  <circle cx="16" cy="6.5"  r="2.5" fill="#5CB8FF"/>
  <circle cx="16" cy="25.5" r="2.5" fill="#5CB8FF"/>
  <circle cx="6.5"  cy="16" r="2.5" fill="#5CB8FF"/>
  <circle cx="25.5" cy="16" r="2.5" fill="#5CB8FF"/>
</svg>
